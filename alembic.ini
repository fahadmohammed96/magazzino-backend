# Configurazione Alembic.
#
# La URL del database NON è scritta qui: viene risolta a runtime in
# migrations/env.py (da DATABASE_URL, o dall'opzione sqlalchemy.url quando
# impostata a livello di programma, es. nei test d'integrazione).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Nomi dei file di revisione: data + slug, per un ordinamento leggibile.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
